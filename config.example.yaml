# SyncWatch Configuration
# Copy this file to config.yaml and modify as needed.

server:
  host: "0.0.0.0"
  port: 8080
  tls: false
  cert_file: ""
  key_file: ""

media:
  scan_dirs:                # Directories to scan for local media files
    - "/media"
  allowed_extensions:
    - ".mp4"
    - ".mkv"
    - ".avi"
    - ".mov"
    - ".webm"
  upload_dir: "/data/uploads"  # Host upload storage

auth:
  password: ""              # Viewer password (plain text, auto-hashed on start)
  admin_password: ""        # Admin password
  # Or use pre-hashed:
  # password_hash: "$argon2id$..."
  # admin_password_hash: "$argon2id$..."
  rate_limit_per_min: 5
  session_timeout: 86400    # 24 hours
  jwt_secret: ""            # Auto-generated if empty

services:
  syncwatch:
    image: ghcr.io/kiseding/syncwatch:${SYNCWATCH_TAG:-latest}
    pull_policy: always
    ports:
      - "${SYNCWATCH_PORT:-8080}:8080"
    volumes:
      - ./media:/media:ro
      - ./data:/data
    env_file:
      - .env
    environment:
      SYNCWATCH_REQUIRE_AUTH_CONFIG: "true"
    restart: unless-stopped

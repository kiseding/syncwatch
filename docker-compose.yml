services:
  syncwatch:
    build: .
    container_name: syncwatch
    ports:
      - "8080:8080"
      - "60000-60100:60000-60100/udp"
    volumes:
      - ./media:/media:ro
      - ./data:/data
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    # For hardware acceleration, uncomment:
    # devices:
    #   - /dev/dri:/dev/dri
